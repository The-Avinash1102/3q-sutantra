<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@4.5.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .container {
            max-width: 400px;
            margin-top: 100px;
        }
        .form-container {
            background-color: #f9f9f9;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }
        .form-title {
            text-align: center;
            margin-bottom: 20px;
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="form-container">
            <h1 class="form-title">Login</h1>
            <!-- Alert for invalid login -->
            <div id="errorAlert" class="alert alert-danger" role="alert" style="display:none;">
                Invalid credentials! Please try again.
            </div>
            <form id="loginForm">
                <div class="mb-3">
                    <label for="email" class="form-label">Email Address</label>
                    <input type="email" class="form-control" id="email" placeholder="Enter your email" required>
                </div>
                <div class="mb-3">
                    <label for="password" class="form-label">Password</label>
                    <input type="password" class="form-control" id="password" placeholder="Enter your password" required>
                </div>
                <button type="submit" class="btn btn-primary btn-block">Login</button>
            </form>
        </div>
    </div>

    <script>
        const form = document.getElementById("loginForm");
        const emailInput = document.getElementById("email");
        const passwordInput = document.getElementById("password");
        const errorAlert = document.getElementById("errorAlert");

        const validUsers = [
            { email: "user1@example.com", password: "password123" },
            { email: "user2@example.com", password: "password456" }
        ];

        // Event listener for form submission
        form.addEventListener("submit", function(e) {
            e.preventDefault();

            const email = emailInput.value;
            const password = passwordInput.value;

            // Check if the entered credentials match any valid user
            const user = validUsers.find(u => u.email === email && u.password === password);

            if (user) {
                // Store login state in localStorage
                localStorage.setItem("loggedIn", "true");
                localStorage.setItem("userEmail", email);  // Store user's email (optional)

                // Redirect to the hackathons page
                window.location.href = "hackathons_available.html";  // Change this to your hackathons page URL
            } else {
                // Show error if credentials are invalid
                errorAlert.style.display = "block";
            }
        });
    </script>

</body>
</html>
